{% extends 'base.html' %}
{% load static %}

{% block title %}Đăng ký{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon">
                <i class="bx bx-user-plus"></i>
            </div>
            <h1>Đăng ký</h1>
            <p class="text-light">Tạo tài khoản mới để bắt đầu mua sắm.</p>
        </div>

        {% if error %}
        <div class="alert alert-danger">
            <i class="bx bx-error-circle"></i>
            {{ error }}
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label class="form-label" for="fullname">Họ và tên</label>
                <div class="input-icon-wrapper">
                    <i class="bx bx-user"></i>
                    <input type="text" id="fullname" name="fullname" class="form-control" placeholder="Nhập họ và tên" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="username">Tên đăng nhập</label>
                <div class="input-icon-wrapper">
                    <i class="bx bx-id-card"></i>
                    <input type="text" id="username" name="username" class="form-control" placeholder="Nhập tên đăng nhập" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <div class="input-icon-wrapper">
                    <i class="bx bx-envelope"></i>
                    <input type="email" id="email" name="email" class="form-control" placeholder="Nhập địa chỉ email" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Mật khẩu</label>
                <div class="input-icon-wrapper">
                    <i class="bx bx-lock-alt"></i>
                    <input type="password" id="password" name="password" class="form-control" placeholder="Nhập mật khẩu" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                <i class="bx bx-user-plus"></i> Đăng ký
            </button>
        </form>

        <div class="auth-footer">
            <p>Đã có tài khoản? <a href="{% url 'login' %}">Đăng nhập</a></p>
        </div>
    </div>
</div>
{% endblock %}
